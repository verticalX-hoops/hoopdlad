<!DOCTYPE html>
<html>
<head>
<title>VerticalX Hoops</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f5f5f5;
padding:30px;
}

h1{
color:#ff6600;
}

input{
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🏀 VerticalX Hoops</h1>

<h2>Calculadora de salto vertical</h2>

<input id="salto" type="number" placeholder="Salto en cm">

<br>

<button onclick="calcular()">
Calcular
</button>

<h3 id="resultado"></h3>

<script>
function calcular(){

let salto =
document.getElementById("salto").value;

if(salto >= 80){
document.getElementById("resultado").innerHTML =
"🔥 Nivel excelente para mates";
}
else if(salto >= 65){
document.getElementById("resultado").innerHTML =
"🏀 Muy cerca de hacer mates";
}
else{
document.getElementById("resultado").innerHTML =
"💪 Sigue entrenando tu salto";
}
}
</script>

</body>
</html>
<h2>Todo para mejorar tu juego</h2>

<ul>
<li>🏀 Entrenamientos</li>
<li>📈 Seguimiento de progreso</li>
<li>🔥 Salto vertical</li>
<li>🎯 Tiro</li>
<li>💪 Fuerza</li>
</ul>
